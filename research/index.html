<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathML Representation</title>
</head>
<body>
    <math xmlns="http://www.w3.org/1998/Math/MathML">
        <mrow>
            <mi>y</mi>
            <mo>(</mo>
            <mi>t</mi>
            <mo>)</mo>
            <mo>=</mo>
            <mi>A</mi>
            <mo>sin</mo>
            <mo>(</mo>
            <mi>ω</mi>
            <mo>t</mo>
            <mo>+</mo>
            <mi>ϕ</mi>
            <mo>)</mo>
        </mrow>
    </math>
    <p>y(t) = A sin(&omega; t + &phi;)</p>
</body>
</html>
